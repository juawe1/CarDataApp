name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore Core
        run: dotnet restore Bmw.Dashboard.Core/Bmw.Dashboard.Core.csproj

      - name: Restore Tests
        run: dotnet restore Bmw.Dashboard.Tests/Bmw.Dashboard.Tests.csproj

      - name: Build Core
        run: dotnet build Bmw.Dashboard.Core/Bmw.Dashboard.Core.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Bmw.Dashboard.Tests/Bmw.Dashboard.Tests.csproj --configuration Release --no-restore --verbosity normal
