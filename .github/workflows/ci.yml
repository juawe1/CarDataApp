name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: |
          dotnet restore "**/*.sln" || dotnet restore

      - name: Build
        run: |
          dotnet build "**/*.sln" --configuration Release --no-restore

      - name: Run tests
        shell: pwsh
        run: |
          $tests = Get-ChildItem -Path . -Recurse -Filter '*Tests.csproj' -ErrorAction SilentlyContinue
          if ($tests) {
            foreach ($t in $tests) { dotnet test $t.FullName --configuration Release --no-build --verbosity normal }
          }
          else {
            Write-Host "No test projects found."
          }
